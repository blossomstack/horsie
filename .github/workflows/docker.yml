name: Docker

# Builds and publishes the two horsie images to GitHub Container Registry on
# every push to main and every v* release tag:
#   - ghcr.io/<owner>/horsie          (session server: `horsie serve` + web UI)
#   - ghcr.io/<owner>/horsie-runtime  (remote runtime scheduled onto velos)
#
# Mirrors the velos pipeline: auth via the workflow's OIDC-minted GITHUB_TOKEN
# (no stored registry secret); OIDC also backs the keyless cosign signature and
# the build-provenance attestation. Tags are immutable: sha-<shortsha> on every
# build, plus <version>/v<version> on release tags. No moving tags.
#
# Multi-arch is built on native runners (no QEMU): each (image, arch) builds and
# pushes by digest, then a per-image merge job assembles the manifest list and
# applies the tags. The runtime image's arm64 variant is the one velos schedules
# onto the Apple-Containerization Mac workers.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # PR gate: build both images (single-arch, no push) so a broken Dockerfile is
  # caught before merge. The publish jobs below are skipped on pull_request.
  validate:
    name: Validate build (${{ matrix.image }})
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: horsie,         dockerfile: docker/server.Dockerfile }
          - { image: horsie-runtime, dockerfile: docker/runtime.Dockerfile }
    steps:
      - uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: false
          cache-from: type=gha,scope=${{ matrix.image }}-linux/amd64
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-linux/amd64

  build:
    name: Build ${{ matrix.image }} (${{ matrix.platform }})
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write # push image blobs/digests to GHCR
    strategy:
      fail-fast: false
      matrix:
        include:
          - { key: server,  image: horsie,         dockerfile: docker/server.Dockerfile,  platform: linux/amd64, runner: ubuntu-latest }
          - { key: server,  image: horsie,         dockerfile: docker/server.Dockerfile,  platform: linux/arm64, runner: ubuntu-24.04-arm }
          - { key: runtime, image: horsie-runtime, dockerfile: docker/runtime.Dockerfile, platform: linux/amd64, runner: ubuntu-latest }
          - { key: runtime, image: horsie-runtime, dockerfile: docker/runtime.Dockerfile, platform: linux/arm64, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          # Push by digest only; the merge job applies the human-readable tags to
          # the combined manifest list.
          outputs: type=image,name=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          # `key` (server|runtime) — not `image` (horsie|horsie-runtime) — so the
          # merge job's download glob can't cross-match (horsie is a prefix of
          # horsie-runtime). Slashes in the platform would break the name.
          name: digest-${{ matrix.key }}-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge ${{ matrix.image }} and publish
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      packages: write # create/push the manifest list
      id-token: write # OIDC: keyless cosign signing + provenance attestation
      attestations: write # write the build-provenance attestation
    strategy:
      fail-fast: false
      matrix:
        include:
          - { key: server,  image: horsie }
          - { key: runtime, image: horsie-runtime }
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.key }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          # Immutable tags only: short SHA on every build; version + v-prefixed
          # version on release tags. No moving tags.
          tags: |
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern=v{{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          # Word-splitting of the -t flags and digest refs is intentional.
          # shellcheck disable=SC2046
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}@sha256:%s ' *)

      - name: Inspect and capture digest
        id: digest
        run: |
          digest=$(docker buildx imagetools inspect \
            "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:${{ steps.meta.outputs.version }}" \
            --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Generate build-provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless / OIDC)
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign --recursive \
            "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}@${{ steps.digest.outputs.digest }}"
