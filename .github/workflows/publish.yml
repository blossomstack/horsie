name: Publish

# Publishes every workspace crate to crates.io, in dependency order, via
# Trusted Publishing (OIDC) — no long-lived token.
#
# One-time setup on crates.io (after each crate exists): crate Settings ->
# Trusted Publishing -> GitHub, with repository blossomstack/horsie and
# workflow publish.yml (each crate needs its own config).
#
# Bootstrap caveat: trusted publishing can only be configured for crates that
# already exist on crates.io, so the very first publish falls back to the
# CARGO_REGISTRY_TOKEN repo secret. Delete the secret once OIDC is configured.
#
# Cross-repo ordering for a fresh registry: async-llm and the hackamore-*
# crates must be on crates.io before this workflow can verify, since the
# published horsie crates depend on them by version.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Match ci.yml — single source of truth for the pinned toolchain.
  RUST_TOOLCHAIN: "1.96.0"

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    permissions:
      id-token: write # mint the OIDC token exchanged for a temp crates.io token
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust ${{ env.RUST_TOOLCHAIN }}
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Authenticate with crates.io (OIDC)
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.4
        # First-ever publish has no trusted-publishing config yet; fall through
        # to the token secret below instead of failing the run.
        continue-on-error: true

      # Publish each publishable member (derived from cargo metadata, so new
      # crates are picked up automatically), skipping versions the registry
      # already has. Multiple passes resolve dependency order: a crate whose
      # deps aren't published yet fails its pass and succeeds in a later one.
      # This sidesteps a cargo 1.96 `--workspace` publish bug where the
      # index-confirmation loop desyncs mid-chain ("no packages ready to
      # publish but N remain in plan"), and makes reruns resumable.
      - name: cargo publish
        run: |
          mapfile -t pkgs < <(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.publish == null) | "\(.name) \(.version)"')
          for pass in $(seq 1 ${#pkgs[@]}); do
            progress=0 remaining=0
            for pkg in "${pkgs[@]}"; do
              name=${pkg% *} version=${pkg#* }
              if curl -fsS -A "publish-workflow (github.com/${{ github.repository }})" \
                  "https://crates.io/api/v1/crates/$name/$version" >/dev/null 2>&1; then
                continue
              fi
              remaining=1
              if cargo publish -p "$name" --locked; then progress=1; fi
            done
            [ "$remaining" = 0 ] && exit 0
            [ "$progress" = 0 ] && { echo "no progress in pass $pass"; exit 1; }
          done
          echo "crates still unpublished after ${#pkgs[@]} passes"; exit 1
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token || secrets.CARGO_REGISTRY_TOKEN }}
          # The runner hits spurious HTTP/2 broken-pipe errors against
          # crates.io, which desync cargo's wait-for-publish loop ("no
          # packages ready to publish but N remain in plan"). HTTP/1.1 and a
          # longer confirmation window keep the chained publish alive.
          CARGO_HTTP_MULTIPLEXING: "false"
          CARGO_PUBLISH_TIMEOUT: "300"

  release-binaries:
    name: Release binaries (${{ matrix.target }})
    # Only meaningful for version tags; manual dispatch reruns (e.g. after a
    # crates.io rate limit) on a branch ref skip this job.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write # create the release and upload assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: macos-latest # cross-compiled; Intel runners are being retired
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust ${{ env.RUST_TOOLCHAIN }}
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked -p horsie -p horsie-runtime --target ${{ matrix.target }}

      - name: Package
        run: |
          tar -czf "horsie-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz" \
            -C "target/${{ matrix.target }}/release" horsie horsie-runtime

      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # First matrix job to get here creates the release; the rest just upload.
          gh release create "$GITHUB_REF_NAME" --verify-tag --title "$GITHUB_REF_NAME" --generate-notes 2>/dev/null || true
          gh release upload "$GITHUB_REF_NAME" "horsie-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz" --clobber
