name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # Include `edited` so a PR auto-retargeted onto main (e.g. when its parent
    # in a stack merges) triggers CI — the default types omit base-branch changes.
    types: [opened, synchronize, reopened, edited]

# Least privilege: jobs only need to read the repo. Elevate per-job if ever needed.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Pinned Rust toolchain — single source of truth for CI. Bump deliberately
  # (a new stable can introduce clippy lints that fail under -D warnings).
  RUST_TOOLCHAIN: "1.96.0"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust ${{ env.RUST_TOOLCHAIN }}
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --locked --workspace --all-features

  cargo-deny:
    name: Supply chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check advisories bans licenses sources

  ts-types:
    name: TypeScript types (drift check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust ${{ env.RUST_TOOLCHAIN }}
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1

      # The `fluorite` CLI that generates the TypeScript types is shipped by the
      # `fluorite_codegen` crate (the `fluorite` crate itself is a library). Pin
      # to the EXACT workspace codegen version so the drift check is deterministic
      # — bump this in lockstep with the `fluorite_codegen` workspace dep. Node is
      # preinstalled on the GitHub-hosted runner.
      - name: Install fluorite CLI
        run: cargo install fluorite_codegen --version =0.6.0

      - name: Regenerate and typecheck
        run: make ts-types

      - name: Fail on uncommitted drift
        run: git diff --exit-code clients/ts/src/generated
